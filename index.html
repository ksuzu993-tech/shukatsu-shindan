<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRENGTH FIELD — 就活のための自己診断</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070912;
    --bg-2:rgba(18,22,40,.6);
    --bg-3:rgba(28,34,60,.7);
    --line:rgba(110,130,200,.18);
    --line-2:rgba(110,130,200,.32);
    --text:#eef1fb;
    --text-2:#9aa6c8;
    --text-3:#5a6488;
    --accent:#5fa0ff;
    --accent-2:#36e6c0;
    --glow:rgba(95,160,255,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Noto Sans JP","Inter",sans-serif;line-height:1.85;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative;min-height:100vh;
  }
  /* 粒子キャンバス（最背面・固定） */
  #field{position:fixed;inset:0;z-index:0;display:block}
  /* ビネット */
  body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(circle at 50% 38%,transparent 30%,rgba(7,9,18,.55) 78%,rgba(7,9,18,.9) 100%)}
  .wrap{max-width:680px;margin:0 auto;padding:0 24px;position:relative;z-index:3}
  @media(min-width:900px){ .wrap{max-width:780px;padding:0 36px} }
  .mono{font-family:"Inter",sans-serif;font-feature-settings:"tnum"}

  /* ===== ボタン ===== */
  .btn{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:15px;letter-spacing:.04em;
    cursor:pointer;border:1px solid transparent;border-radius:999px;padding:16px 38px;position:relative;overflow:hidden;
    transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s,color .3s;}
  .btn-primary{color:#04122e;border:none;
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    box-shadow:0 0 0 0 var(--glow),0 8px 30px rgba(95,160,255,.4)}
  .btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 0 36px 4px var(--glow),0 14px 40px rgba(95,160,255,.5)}
  .btn-primary::after{content:"";position:absolute;inset:0;border-radius:999px;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
    transform:translateX(-130%) skewX(-20deg);transition:none}
  .btn-primary:hover::after{animation:sheen .9s ease}
  @keyframes sheen{to{transform:translateX(130%) skewX(-20deg)}}
  .btn-ghost{background:rgba(255,255,255,.03);color:var(--text);border-color:var(--line-2);backdrop-filter:blur(8px)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

  /* ===== グラスパネル ===== */
  .glass{background:var(--bg-2);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 16px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}

  /* ===== イントロ ===== */
  .hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:56px 0}
  .eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:28px;opacity:0;animation:fade .9s .2s forwards;justify-content:center}
  .eyebrow .tag{font-family:"Inter",sans-serif;font-size:11px;font-weight:600;letter-spacing:.34em;
    color:var(--accent);text-transform:uppercase}
  .eyebrow .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-2);
    box-shadow:0 0 0 0 rgba(54,230,192,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(54,230,192,.6)}70%{box-shadow:0 0 0 12px rgba(54,230,192,0)}100%{box-shadow:0 0 0 0 rgba(54,230,192,0)}}
  .hero h1{font-family:"Noto Sans JP",sans-serif;font-weight:900;
    font-size:clamp(36px,8.2vw,66px);line-height:1.24;letter-spacing:.01em;margin-bottom:26px}
  .hero h1 .line{display:block;overflow:hidden}
  .hero h1 .line>span{display:block;transform:translateY(110%);animation:reveal 1s cubic-bezier(.16,1,.3,1) forwards}
  .hero h1 .line:nth-child(1)>span{animation-delay:.25s}
  .hero h1 .line:nth-child(2)>span{animation-delay:.42s}
  .hero h1 .line:nth-child(3)>span{animation-delay:.59s}
  .hero h1 .grad{background:linear-gradient(110deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 18px rgba(95,160,255,.4))}
  @keyframes reveal{to{transform:none}}
  .lede{font-size:16px;color:var(--text-2);max-width:52ch;margin:0 auto 14px;opacity:0;animation:fade .9s .7s forwards}
  .lede.l2{animation-delay:.82s}
  @media(max-width:560px){ .lede br{display:none} }
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:32px;opacity:0;animation:fade .9s .95s forwards;justify-content:center}
  .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-2);border-radius:999px;
    padding:9px 16px;font-size:12.5px;font-weight:600;color:var(--text-2);background:rgba(255,255,255,.02);backdrop-filter:blur(6px)}
  .pill .d{width:7px;height:7px;border-radius:50%}
  .hero .btn-primary{margin-top:42px;align-self:center;opacity:0;animation:fade .9s 1.1s forwards}
  .scrollhint{margin-top:40px;font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.2em;color:var(--text-3);
    opacity:0;animation:fade .9s 1.3s forwards;display:flex;align-items:center;gap:10px;justify-content:center}
  .scrollhint .ar{width:18px;height:18px;border-right:1.5px solid var(--text-3);border-bottom:1.5px solid var(--text-3);
    transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(3px,3px)}}
  @keyframes fade{to{opacity:1}}

  /* ===== 進行 ===== */
  .progress{position:sticky;top:0;z-index:30;background:rgba(7,9,18,.6);backdrop-filter:blur(14px);
    padding:16px 0;border-bottom:1px solid var(--line)}
  .progress .wrap{display:flex;align-items:center;gap:18px}
  .pcount{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;color:var(--text-2);white-space:nowrap}
  .pcount b{color:var(--accent)}
  .pbar{flex:1;height:3px;background:var(--line);border-radius:2px;position:relative;overflow:hidden}
  .pfill{height:100%;border-radius:2px;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));
    transition:width .55s cubic-bezier(.4,0,.2,1);box-shadow:0 0 14px var(--glow)}

  /* ===== 設問 ===== */
  .quiz{padding:52px 0 80px;min-height:64vh}
  .qcard{animation:cIn .6s cubic-bezier(.16,1,.3,1) both}
  .qcard.out{animation:cOut .32s ease forwards}
  @keyframes cIn{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes cOut{to{opacity:0;transform:translateY(-22px) scale(.98)}}
  .qnum{font-family:"Inter",sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;color:var(--accent);
    margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .qnum .bar{height:1px;width:30px;background:linear-gradient(90deg,var(--accent),transparent)}
  .qtext{font-size:23px;line-height:1.5;font-weight:700;margin-bottom:32px;max-width:27ch}
  .opts{display:flex;flex-direction:column;gap:12px}
  .opt{text-align:left;border-radius:14px;padding:18px 56px 18px 22px;font-weight:500;font-size:15.5px;
    color:var(--text);cursor:pointer;line-height:1.5;position:relative;
    background:var(--bg-2);border:1px solid var(--line);backdrop-filter:blur(10px);
    transition:border-color .25s,background .25s,transform .25s,box-shadow .25s;
    opacity:0;transform:translateX(22px);animation:oIn .5s cubic-bezier(.16,1,.3,1) forwards}
  .opt:nth-child(1){animation-delay:.06s}.opt:nth-child(2){animation-delay:.13s}
  .opt:nth-child(3){animation-delay:.2s}.opt:nth-child(4){animation-delay:.27s}
  @keyframes oIn{to{opacity:1;transform:none}}
  .opt:hover{border-color:var(--accent);background:var(--bg-3);transform:translateX(4px) translateY(-1px);
    box-shadow:0 8px 30px rgba(95,160,255,.18)}
  .opt:active{transform:scale(.99)}
  .opt.sel{border-color:var(--accent);background:rgba(95,160,255,.14);box-shadow:0 0 24px rgba(95,160,255,.25)}
  .opt .mark{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:22px;height:22px;
    border:1px solid var(--line-2);border-radius:50%;transition:.25s;display:grid;place-items:center}
  .opt .mark::after{content:"";width:7px;height:12px;border:solid #04122e;border-width:0 2px 2px 0;
    transform:rotate(42deg) scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
  .opt.sel .mark{background:linear-gradient(120deg,var(--accent),var(--accent-2));border-color:transparent}
  .opt.sel .mark::after{transform:rotate(42deg) scale(1) translateY(-1px)}
  .qnav{margin-top:32px}
  .qnav .btn-ghost{padding:12px 24px;font-size:13.5px}

  /* ===== 結果 ===== */
  .result{padding:52px 0 96px;animation:fade .7s ease both}
  .rkicker{font-family:"Inter",sans-serif;font-size:11px;font-weight:600;letter-spacing:.3em;color:var(--accent);
    text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .rkicker .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent-2);animation:pulse 2s infinite}
  .rtitle{font-size:clamp(32px,7.5vw,54px);font-weight:900;line-height:1.16;margin-bottom:12px;letter-spacing:.01em}
  .rtitle .grad{background:linear-gradient(110deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px rgba(95,160,255,.4))}
  .rsub{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:40px}
  .rsub .mono{color:var(--accent-2)}

  .bars{margin:0 0 40px;padding:24px;border-radius:18px}
  .bar-row{padding:14px 0;border-bottom:1px solid var(--line)}
  .bar-row:last-child{border-bottom:none}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .bar-name{font-weight:700;font-size:15px}
  .bar-name .pct{font-family:"Inter",sans-serif;font-size:13px;color:var(--text-2);margin-left:10px}
  .bar-blurb{font-size:12px;color:var(--text-3)}
  .bar-track{height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;width:0;transition:width 1.2s cubic-bezier(.3,.9,.3,1);position:relative}
  .bar-fill::after{content:"";position:absolute;right:0;top:50%;transform:translateY(-50%);width:6px;height:6px;
    border-radius:50%;background:#fff;box-shadow:0 0 10px 2px currentColor}

  .block{margin-bottom:16px;padding:26px 24px;border-radius:18px}
  .block h3{font-family:"Inter",sans-serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .block h3 .no{color:var(--text-3)}
  .block p{font-size:15.5px;color:var(--text);margin-bottom:14px}
  .block p:last-child{margin-bottom:0}
  .block b{color:var(--accent-2);font-weight:700}
  .pull{border-left:2px solid var(--accent);padding:6px 0 6px 20px;margin:4px 0 20px;font-size:18px;
    line-height:1.6;font-weight:700;color:var(--text)}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:8px}
  .chip{font-family:"Inter",sans-serif;font-size:12px;font-weight:600;border:1px solid var(--line-2);border-radius:999px;
    padding:6px 14px;color:var(--text-2)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .jobs{display:flex;flex-direction:column;gap:9px;margin-top:2px}
  .job{display:flex;gap:14px;align-items:center;padding:12px 16px;border-radius:12px;
    background:rgba(255,255,255,.03);border:1px solid var(--line)}
  .job .jn{font-family:"Inter",sans-serif;font-weight:700;color:var(--accent);font-size:12px;flex-shrink:0;width:2em}
  .job .jt{font-size:15px;font-weight:500;line-height:1.5}
  .qa{border-radius:14px;padding:20px 22px;margin-bottom:12px;background:rgba(255,255,255,.03);border:1px solid var(--line)}
  .qa .q{font-weight:700;font-size:15px;margin-bottom:10px;color:var(--accent-2)}
  .qa .a{font-size:14.5px;color:var(--text-2);line-height:1.75}
  .disc{font-size:12px;color:var(--text-3);margin-top:32px;line-height:1.7;text-align:center}
  .rfoot{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

  .hidden{display:none!important}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:opacity .2s!important}
    .opt,.lede,.meta,.eyebrow,.hero h1 .line>span,.hero .btn-primary,.scrollhint{opacity:1!important;transform:none!important}
  }
  @media(max-width:520px){ .qtext{font-size:20px} .hero{padding:40px 0} }
</style>
</head>
<body>

<canvas id="field"></canvas>

<!-- ===== イントロ ===== -->
<section id="intro" class="hero">
  <div class="wrap">
    <div class="eyebrow"><span class="pulse"></span><span class="tag">Strength Field</span></div>
    <h1>
      <span class="line"><span>強みは、</span></span>
      <span class="line"><span><span class="grad">粒</span>のように</span></span>
      <span class="line"><span>散らばっている。</span></span>
    </h1>
    <p class="lede">エントリーシートや面接で問われる自己PR。<br>答えに詰まるのは強みが無いからではなく、<br>まだ形を結んでいないからだ。</p>
    <p class="lede l2">20の設問が、散らばった粒を引き寄せ、<br>ひとつの輪郭に束ねていく。<br>面接でそのまま使える言葉として。</p>
    <div class="meta">
      <span class="pill"><span class="d" style="background:var(--accent)"></span>全20問・約7分</span>
      <span class="pill"><span class="d" style="background:var(--accent-2)"></span>登録・保存なし</span>
      <span class="pill"><span class="d" style="background:#b07cff"></span>結果はこの画面だけ</span>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">診断を開始する</button>
    <div class="scrollhint">DRAG / MOVE — 粒に触れてみて<span class="ar"></span></div>
  </div>
</section>

<!-- ===== 進行 ===== -->
<div id="progress" class="progress hidden">
  <div class="wrap">
    <span class="pcount mono"><b id="pnow">01</b> / 20</span>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
</div>

<!-- ===== 設問 ===== -->
<section id="quiz" class="quiz hidden">
  <div class="wrap"><div class="qcard" id="qcard"></div></div>
</section>

<!-- ===== 結果 ===== -->
<section id="result" class="result hidden">
  <div class="wrap" id="rwrap"></div>
</section>

<script>
/* =======================================================================
   生きた粒子フィールド（Canvas）
   - 常時ゆっくり漂う粒子
   - マウス/タッチに反応（近づくと逃げ、ラインで結ばれる）
   - 診断の進行度に応じて活性度・色が変化
   ======================================================================= */
(function(){
  const cv=document.getElementById('field');
  const ctx=cv.getContext('2d');
  let W,H,DPR,particles=[],mouse={x:-999,y:-999,active:false};
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // テーマ（進行で変化）
  let energy=0.0;            // 0→1 診断が進むほど上がる
  const COL={r:95,g:160,b:255};   // 基本色（accent）
  const COL2={r:54,g:230,b:192};  // accent-2

  function size(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
    cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  }
  function makeParticles(){
    const area=innerWidth*innerHeight;
    let n=Math.round(area/16000);          // 密度
    n=Math.max(40,Math.min(reduce?40:130,n));
    particles=[];
    for(let i=0;i<n;i++){
      particles.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-.5)*0.22*DPR, vy:(Math.random()-.5)*0.22*DPR,
        r:(Math.random()*1.6+0.6)*DPR,
        tw:Math.random()*Math.PI*2
      });
    }
  }
  function lerp(a,b,t){return a+(b-a)*t;}
  function curCol(){
    return {
      r:Math.round(lerp(COL.r,COL2.r,energy)),
      g:Math.round(lerp(COL.g,COL2.g,energy)),
      b:Math.round(lerp(COL.b,COL2.b,energy))
    };
  }

  function step(){
    ctx.clearRect(0,0,W,H);
    const c=curCol();
    const linkDist=(110+energy*40)*DPR;
    const speedK=1+energy*1.6;

    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      p.x+=p.vx*speedK; p.y+=p.vy*speedK;
      p.tw+=0.02;
      // 端で回り込み
      if(p.x<0)p.x+=W; if(p.x>W)p.x-=W; if(p.y<0)p.y+=H; if(p.y>H)p.y-=H;

      // マウス反発
      if(mouse.active){
        const dx=p.x-mouse.x*DPR, dy=p.y-mouse.y*DPR;
        const d2=dx*dx+dy*dy; const R=140*DPR;
        if(d2<R*R){
          const d=Math.sqrt(d2)||1; const f=(R-d)/R*1.4;
          p.x+=dx/d*f*2.2; p.y+=dy/d*f*2.2;
        }
      }
      // 描画（瞬き）
      const a=0.5+Math.sin(p.tw)*0.3;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${a})`;
      ctx.fill();
    }
    // 接続線
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const a=particles[i],b=particles[j];
        const dx=a.x-b.x,dy=a.y-b.y; const d2=dx*dx+dy*dy;
        if(d2<linkDist*linkDist){
          const al=(1-Math.sqrt(d2)/linkDist)*(0.18+energy*0.22);
          ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${al})`;
          ctx.lineWidth=DPR*0.6;
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    // マウス付近の集束リング
    if(mouse.active){
      ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.25)`;
      ctx.lineWidth=DPR;
      ctx.beginPath();ctx.arc(mouse.x*DPR,mouse.y*DPR,140*DPR,0,Math.PI*2);ctx.stroke();
    }
    requestAnimationFrame(step);
  }

  // 進行度を外から設定（0..1）
  window.__setFieldEnergy=function(e){ energy=Math.max(0,Math.min(1,e)); };
  // 完了バースト
  window.__fieldBurst=function(){
    energy=1;
    // 中央へ一瞬集める
    for(const p of particles){
      p.vx+=( (W*0.5-p.x)/W )*1.2;
      p.vy+=( (H*0.4-p.y)/H )*1.2;
    }
    setTimeout(()=>{ for(const p of particles){ p.vx=(Math.random()-.5)*0.3*DPR; p.vy=(Math.random()-.5)*0.3*DPR; } },500);
  };

  function onMove(x,y){ mouse.x=x;mouse.y=y;mouse.active=true; }
  addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
  addEventListener('mouseout',()=>mouse.active=false);
  addEventListener('touchmove',e=>{ if(e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
  addEventListener('touchend',()=>mouse.active=false);
  addEventListener('resize',()=>{size();makeParticles();});

  size();makeParticles();
  if(!reduce) step(); else { // 静止描画1回
    const c=curCol();
    for(const p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},.6)`;ctx.fill();}
  }
})();
</script>

<script>

/* 上位2軸の組み合わせに対するタイプ名 */
const COMBO = {
  DT:"戦略的リーダー型", DE:"求心力リーダー型", DA:"実行型リーダー型", DC:"変革リーダー型",
  TE:"伴走するブレーン型", TA:"堅実な設計者型", TC:"構想する発明家型",
  EA:"信頼される支え手型", EC:"場を動かすムードメーカー型", AC:"工夫する実務家型",
};
function comboName(a,b){ return COMBO[a+b] || COMBO[b+a] || (AXES[a].name+"×"+AXES[b].name+"型"); }



let cur=0;
const answers=Array(QUESTIONS.length).fill(null);
let locked=false;

function setEnergy(){ if(window.__setFieldEnergy) window.__setFieldEnergy(cur/QUESTIONS.length); }

function startQuiz(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('progress').classList.remove('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  cur=0; renderQ(); setEnergy(); window.scrollTo({top:0});
}

function renderQ(){
  const Q=QUESTIONS[cur];
  document.getElementById('pnow').textContent=String(cur+1).padStart(2,'0');
  document.getElementById('pfill').style.width=`${(cur)/QUESTIONS.length*100}%`;
  const host=document.getElementById('qcard');
  host.className='qcard';
  host.innerHTML=`
    <div class="qnum"><span class="bar"></span>QUESTION ${String(cur+1).padStart(2,'0')}</div>
    <div class="qtext">${Q.q}</div>
    <div class="opts" id="opts"></div>
    <div class="qnav">
      <button class="btn btn-ghost" id="backBtn" ${cur===0?'style="visibility:hidden"':''} onclick="prevQ()">← 前へ</button>
    </div>`;
  const opts=host.querySelector('#opts');
  Q.o.forEach((op,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(answers[cur]===i?' sel':'');
    b.innerHTML=`${op.t}<span class="mark"></span>`;
    b.onclick=()=>choose(i);
    opts.appendChild(b);
  });
  locked=false;
}

function choose(i){
  if(locked) return;
  answers[cur]=i;
  document.querySelectorAll('#opts .opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  locked=true;
  const host=document.getElementById('qcard');
  setTimeout(()=>{
    if(cur<QUESTIONS.length-1){
      host.classList.add('out');
      setTimeout(()=>{cur++;renderQ();setEnergy();window.scrollTo({top:0});},300);
    }else{
      document.getElementById('pfill').style.width='100%';
      if(window.__setFieldEnergy)window.__setFieldEnergy(1);
      showResult();
    }
  },290);
}
function prevQ(){ if(cur>0){cur--;renderQ();setEnergy();window.scrollTo({top:0});} }

function showResult(){
  const score={D:0,T:0,E:0,A:0,C:0};
  answers.forEach((ai,qi)=>{const s=QUESTIONS[qi].o[ai].s;for(const k in s)score[k]+=s[k];});
  const max=Math.max(...Object.values(score),1);
  const ranked=Object.keys(score).sort((a,b)=>score[b]-score[a]);
  const [top1,top2,top3]=ranked;
  const type=comboName(top1,top2);

  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

        <span class="chip"><span class="dot" style="background:${AXES[top3].color}"></span>${AXES[top3].name}</span>
      </div>
    </div>

      <h3><span class="no">03 —</span> 留意点（裏返しの弱み）</h3>
      <p>${d1.caution}</p>

  window.scrollTo({top:0});

  },200));

  if(window.__liffCanShare){
    const sb=document.getElementById('shareBtn'); if(sb) sb.classList.remove('hidden');
  }
}

/* ======================================================================
   LIFF（LINE連携）セットアップ
   ★ここだけ書き換え★ LINE Developersで発行されるLIFF IDを貼ります。
   例: "2000000000-AbcdEfgh"
   ====================================================================== */
const LIFF_ID = "YOUR_LIFF_ID";
window.__liffCanShare = false;

(function initLiff(){
  if(typeof liff === "undefined" || LIFF_ID === "YOUR_LIFF_ID"){ return; }
  liff.init({ liffId: LIFF_ID }).then(function(){
    try{
      if(liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
        window.__liffCanShare = true;
        var sb=document.getElementById('shareBtn'); if(sb) sb.classList.remove('hidden');
      }
    }catch(e){}
  }).catch(function(err){ console.warn("LIFF init failed（診断は通常通り使えます）:", err); });
})();

function shareResult(typeName){
  var url = location.href.split('#')[0];
  var text = "就活の自己診断で「"+typeName+"」と診断されました。";
  if(typeof liff !== "undefined" && window.__liffCanShare){
    liff.shareTargetPicker([{ type:"text", text: text + "\n" + url }]).catch(function(e){console.warn(e);});
  }else if(navigator.share){
    navigator.share({ text:text, url:url }).catch(function(){});
  }
}
</script>
