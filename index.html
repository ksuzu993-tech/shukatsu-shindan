<style>

  .qcard{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}

    <p class="lede">20の問いに答えると、あなたの働き方の傾向を5つの軸で可視化し、面接でそのまま使える文章フィードバックをお返しします。</p>

<script>
/* ====== 5つの強み軸 ======
   D 牽引(リーダーシップ) / T 思考(分析・構想) /
   E 共感(対人・協働)     / A 実行(やり遂げ・堅実) /
   C 創発(発想・変化)                                  */
const AXES = {
  D:{name:"牽引力",  blurb:"場をまとめ、決め、引っ張る", color:"#b4623f"},
  T:{name:"思考力",  blurb:"構造で捉え、筋道を立てる",   color:"#33503a"},
  E:{name:"共感力",  blurb:"人を理解し、関係を築く",     color:"#a6863c"},
  A:{name:"実行力",  blurb:"最後までやり切り、形にする", color:"#4a6b4f"},
  C:{name:"創発力",  blurb:"発想し、変化を起こす",       color:"#7a6c9e"}
};

  { q:"グループで物事を進めるとき、自然と引き受けがちな役割は?",

      {t:"メンバーの様子を見て、雰囲気を整える",    s:{E:2,A:1}},

      {t:"詳しい人に相談し、力を借りる",            s:{E:2,T:1}},

  { q:"あなたが「やりきった」と感じるのはどんなとき?",

  { q:"締め切りが迫っている。あなたの動き方は?",

      {t:"優先順位をつけ、淡々と片付ける",          s:{A:2,T:1}},
      {t:"役割を割り振り、全体を回す",              s:{D:2,A:1}},
      {t:"全体像を描き直し、最短ルートを設計する",  s:{T:2,C:1}},
      {t:"思い切ってやり方ごと変えてみる",          s:{C:2,D:1}},

      jobs:["コンサルティング","企画・戦略","エンジニア／研究開発","金融・専門職"] },
  E:{ strength:"相手の立場や感情を汲み、信頼関係を築きながら物事を前に進められること。",
      pr:"「対立や温度差を、関係づくりで乗り越えた経験」が効きます。“相手をどう理解したか”の描写が説得力になります。",
      caution:"「みんなと仲良く」止まりだと弱く聞こえます。協働の結果どんな成果が出たか、貢献を数字や事実で補強を。",
      jobs:["人事・採用","営業・カスタマーサクセス","教育・人材","チーム連携の多い職種"] },
  A:{ strength:"決めたことを最後までやり切り、地道な積み重ねを確実に成果へ変えられること。",
      pr:"「長く続けてやり遂げた経験」が信頼の証。“どんな工夫で継続したか”を語ると、ただの根性論になりません。",
      caution:"真面目さは伝わる一方で「指示待ち」に見える危険も。自分で考えて動いた場面を一つ入れておきましょう。",
      jobs:["管理・オペレーション","品質・生産管理","事務・財務","堅実な実行が問われる職種"] },
  C:{ strength:"既存のやり方を疑い、新しい発想や切り口で変化を起こせること。",
      pr:"「前例の無いことに挑んだ経験」が光ります。“なぜそう発想したか”の動機まで語ると、思いつきに見えません。",
      caution:"アイデア倒れに見えないよう、実際に形にして・周りを動かした事実を必ずセットに。",
      jobs:["企画・マーケティング","クリエイティブ","新規事業・スタートアップ","変化の速い業界"] },
};

/* 上位2軸の組み合わせに対するタイプ名 */
const COMBO = {
  DT:"戦略的リーダー型", DE:"求心力リーダー型", DA:"実行型リーダー型", DC:"変革リーダー型",
  TE:"伴走するブレーン型", TA:"堅実な設計者型", TC:"構想する発明家型",
  EA:"信頼される支え手型", EC:"場を動かすムードメーカー型", AC:"工夫する実務家型",
};
function comboName(a,b){ return COMBO[a+b] || COMBO[b+a] || (AXES[a].name+"×"+AXES[b].name+"型"); }

/* ====== 状態 ====== */
let cur=0;
const answers=Array(QUESTIONS.length).fill(null);

function startQuiz(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('progress').classList.remove('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  cur=0; renderQ();
  window.scrollTo({top:0});
}

function renderQ(){
  const Q=QUESTIONS[cur];
  document.getElementById('pcount').textContent=`Q${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('pfill').style.width=`${(cur)/QUESTIONS.length*100}%`;
  const card=document.getElementById('qcard');
  card.innerHTML='';
  const inner=document.createElement('div');
  inner.className='qcard';
  inner.innerHTML=`
    <div class="qnum">問 ${String(cur+1).padStart(2,'0')}</div>
    <div class="qtext">${Q.q}</div>
    <div class="opts" id="opts"></div>
    <div class="qnav">
      <button class="btn btn-ghost" id="backBtn" ${cur===0?'style="visibility:hidden"':''} onclick="prevQ()">← もどる</button>
      <span></span>
    </div>`;
  card.replaceWith(inner);
  inner.id='qcard';
  const opts=inner.querySelector('#opts');
  Q.o.forEach((op,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(answers[cur]===i?' sel':'');
    b.innerHTML=`${op.t}<span class="mark"></span>`;
    b.onclick=()=>choose(i);
    opts.appendChild(b);
  });
}

function choose(i){
  answers[cur]=i;
  document.querySelectorAll('#opts .opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  setTimeout(()=>{
    if(cur<QUESTIONS.length-1){cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
    else{showResult();}
  },260);
}
function prevQ(){ if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});} }

function showResult(){
  // スコア集計
  const score={D:0,T:0,E:0,A:0,C:0};
  answers.forEach((ai,qi)=>{
    const s=QUESTIONS[qi].o[ai].s;
    for(const k in s) score[k]+=s[k];
  });
  const max=Math.max(...Object.values(score),1);
  const ranked=Object.keys(score).sort((a,b)=>score[b]-score[a]);
  const [top1,top2,top3]=ranked;
  const type=comboName(top1,top2);

  document.getElementById('progress').classList.add('hidden');
  document.getElementById('quiz').classList.add('hidden');
  const r=document.getElementById('result');
  r.classList.remove('hidden');

  const barRows=ranked.map(k=>{
    const pct=Math.round(score[k]/max*100);
    return `<div class="bar-row">
      <div class="bar-top">
        <span class="bar-name">${AXES[k].name}</span>
        <span class="bar-val">${AXES[k].blurb}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" data-w="${pct}" style="background:${AXES[k].color}"></div></div>
    </div>`;
  }).join('');

  const d1=AXIS_DETAIL[top1], d2=AXIS_DETAIL[top2], d3=AXIS_DETAIL[top3];
  const jobs=[...new Set([...d1.jobs,...d2.jobs])].slice(0,5);

  document.getElementById('rwrap').innerHTML=`
    <div class="rkicker">あなたの診断結果</div>
    <h1 class="rtitle">あなたは<br><span class="accent">${type}</span></h1>
    <p class="rsub">主軸:${AXES[top1].name} × ${AXES[top2].name} ／ 補助軸:${AXES[top3].name}</p>

    <div class="bars">${barRows}</div>

    <div class="block">
      <h3>強みの核心</h3>
      <p class="pull">「${AXES[top1].blurb}」力を土台に、「${AXES[top2].name}」が厚みを加える。</p>
      <p>あなたの一番の武器は、<b>${d1.strength}</b></p>
      <p>そこに ${AXES[top2].name} が組み合わさることで、${d2.strength.replace(/。$/,'')}という側面も併せ持ちます。この二つが重なる人は多くなく、それ自体があなたの個性です。</p>
    </div>

    <div class="block">
      <h3>自己PRでの活かし方</h3>
      <p>${d1.pr}</p>
      <p>面接で長所を聞かれたら、まず結論として「${AXES[top1].name}」を一言で述べ、それを裏づける具体的なエピソードを一つ、<b>状況→自分の行動→結果</b>の順で話すと伝わります。エピソードの中に ${AXES[top2].name} の要素を混ぜると、立体感が出ます。</p>
      <div class="chips">
        <span class="chip"># ${AXES[top1].name}</span>
        <span class="chip"># ${AXES[top2].name}</span>
        <span class="chip"># ${AXES[top3].name}</span>
      </div>
    </div>

    <div class="block">
      <h3>気をつけたい点（裏返しの弱み）</h3>
      <p>${d1.caution}</p>
      <p>面接で短所を聞かれたら、この点を正直に挙げたうえで「だからこう意識している」と対策まで添えると、自己理解の深さとして好印象に変わります。</p>
    </div>

    <div class="block">
      <h3>向いている方向性</h3>
      <p style="margin-bottom:18px">職種そのものより、<b>その仕事で何が問われるか</b>であなたの強みが活きるかが決まります。下記は傾向の目安として。</p>
      <div class="jobs">
        ${jobs.map((j,i)=>`<div class="job"><span class="jn">${String(i+1).padStart(2,'0')}</span><span class="jt">${j}</span></div>`).join('')}
      </div>
    </div>

    <div class="block">
      <h3>面接で聞かれたら、こう答える</h3>
      <div class="qa">
        <div class="q">Q. あなたの強みは何ですか?</div>
        <div class="a">私の強みは ${AXES[top1].name} です。${d1.strength.replace(/こと。$/,'点だと考えています')}。〔ここに、その力を発揮した具体的な経験を一つ〕。この経験から、〇〇な場面で力を発揮できると考えています。</div>
      </div>
      <div class="qa">
        <div class="q">Q. それを仕事でどう活かせますか?</div>
        <div class="a">${AXES[top1].name}に加えて${AXES[top2].name}も意識して動けるので、〔志望職種〕においては、〇〇のような形で貢献できると考えています。</div>
      </div>
      <p style="font-family:'Yu Gothic',sans-serif;font-size:13.5px;color:var(--ink-soft);margin-top:6px">※〔　〕はあなた自身の経験に置き換えてください。診断はあくまで“言葉の出発点”です。</p>
    </div>

    <p class="disc">この診断は20問の選択回答から傾向を簡易に可視化したもので、適性や合否を保証するものではありません。結果はこの画面に表示されるだけで、どこにも保存・送信されていません。気になった軸は、実際の経験を棚卸ししながら深掘りしてみてください。</p>

    <div class="rfoot">
      <button class="btn btn-primary" onclick="location.reload()">もう一度診断する</button>
      <button class="btn btn-ghost" onclick="window.print()">結果を印刷／PDF保存</button>
      <button class="btn btn-ghost hidden" id="shareBtn" onclick="shareResult('${type}')">友だちに教える</button>
    </div>
  `;

  window.scrollTo({top:0});
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>el.style.width=el.dataset.w+'%');
  },120));

  // LIFFのshareTargetPickerが使える環境なら「友だちに教える」を表示
  if(window.__liffCanShare){
    const sb=document.getElementById('shareBtn');
    if(sb) sb.classList.remove('hidden');
  }
}

/* ======================================================================
   LIFF（LINE連携）セットアップ
   ----------------------------------------------------------------------
   ★ここだけ書き換えてください★
   LINE DevelopersでLIFFアプリを作成すると発行される「LIFF ID」を、
   下の YOUR_LIFF_ID に貼り付けます（例: "2000000000-AbcdEfgh"）。
   ====================================================================== */
const LIFF_ID = "YOUR_LIFF_ID";

// この診断はLINEの個人情報を一切使いません。
// そのためログインは強制せず、初期化に失敗しても診断はそのまま使えます。
window.__liffCanShare = false;

(function initLiff(){
  // SDK未読込／LIFF ID未設定なら、ふつうのWebページとして動作
  if(typeof liff === "undefined" || LIFF_ID === "YOUR_LIFF_ID"){ return; }
  liff.init({ liffId: LIFF_ID })
    .then(function(){
      try{
        if(liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
          window.__liffCanShare = true;
          var sb=document.getElementById('shareBtn');
          if(sb) sb.classList.remove('hidden'); // 結果表示済みなら即出す
        }
      }catch(e){ /* 判定不可なら何もしない */ }
    })
    .catch(function(err){
      // 初期化に失敗しても診断機能はそのまま使える
      console.warn("LIFF init failed（診断は通常通り使えます）:", err);
    });
})();

// 結果を友だちに共有
function shareResult(typeName){
  var url = location.href.split('#')[0];
  var text = "就活の自己診断、やってみたら「"+typeName+"」だった。5分でできるよ 👉";
  if(typeof liff !== "undefined" && window.__liffCanShare){
    liff.shareTargetPicker([{ type:"text", text: text + "\n" + url }])
      .catch(function(err){ console.warn("share failed:", err); });
  }else if(navigator.share){
    navigator.share({ text: text, url: url }).catch(function(){});
  }
}

</script>
